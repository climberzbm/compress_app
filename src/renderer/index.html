<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>媒体压缩工具</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: #1a1b1e;
      color: #e4e4e7;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      background: #25262b;
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.35);
    }
    h1 {
      margin: 0 0 1.5rem;
      font-size: 1.35rem;
      font-weight: 600;
      color: #fff;
    }
    .actions {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }
    button {
      flex: 1;
      padding: 0.65rem 1rem;
      font-size: 0.9rem;
      font-weight: 500;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }
    button:hover:not(:disabled) { opacity: 0.92; }
    button:active:not(:disabled) { opacity: 0.88; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #selectBtn {
      background: #3b82f6;
      color: #fff;
    }
    #startBtn {
      background: #22c55e;
      color: #fff;
    }
    #folder {
      margin: 0 0 1rem;
      padding: 0.6rem 0.75rem;
      background: #2c2d31;
      border-radius: 8px;
      font-size: 0.85rem;
      color: #a1a1aa;
      min-height: 2.5rem;
      word-break: break-all;
    }
    #folder:not(:empty) { color: #e4e4e7; }
    progress {
      width: 100%;
      height: 8px;
      margin-bottom: 0.5rem;
      border-radius: 4px;
      overflow: hidden;
      background: #2c2d31;
      -webkit-appearance: none;
      appearance: none;
    }
    progress::-webkit-progress-bar { background: #2c2d31; }
    progress::-webkit-progress-value { background: #3b82f6; border-radius: 4px; }
    progress::-moz-progress-bar { background: #3b82f6; border-radius: 4px; }
    #status {
      font-size: 0.85rem;
      color: #71717a;
      min-height: 1.25rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>批量压缩工具</h1>
    <div class="actions">
      <button id="selectBtn" type="button">选择文件夹</button>
      <button id="startBtn" type="button">开始压缩</button>
    </div>
    <p id="folder" aria-live="polite"></p>
    <progress id="progress" value="0" max="100" aria-label="压缩进度"></progress>
    <p id="status"></p>
  </div>
  <script src="ui.js"></script>
</body>
</html>
